<!DOCTYPE html>
<html>
<head>
    <title>TrackWise  - Expenses</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
    <h2>TrackWise</h2>
    <ul>
        <li onclick="location.href='home.html'">Home</li>
        <li onclick="location.href='dashboard.html'">Dashboard</li>
        <li class="active">Expenses</li>
    </ul>
    <div style="position:absolute; bottom:30px; left:20px; right:20px; text-align:center;">
        <img src="../images/sidebar.png" width="200" alt="Finance Illustration">
    </div>
</div>

<div class="main fade-in">

    <div class="card">
        <h3>Add Category</h3>
        <input type="text" id="newCategory" placeholder="Enter category name">
        <button onclick="addCategory()">Add Category</button>
    </div>

    <div class="card">
        <h3>Add Expense</h3>

        <select id="categorySelect">
            <option value="">Select Category</option>
        </select>

        <input type="number" id="amount" placeholder="Amount">

        <input type="date" id="date">

        <input type="text" id="note" placeholder="Add a note (optional)">

        <button onclick="addExpense()">Add Expense</button>
    </div>

    <div class="card">
        <h3>Recent Transactions</h3>

        <table>
            <thead>
                <tr>
                    <th>Category</th>
                    <th>Amount</th>
                    <th>Date</th>
                    <th>Note</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="expenseTable"></tbody>
        </table>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
