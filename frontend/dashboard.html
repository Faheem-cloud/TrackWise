<!DOCTYPE html>
<html>
<head>
    <title>TrackWise Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="sidebar">
    <h2>TrackWise</h2>
    <ul>
        <li onclick="location.href='home.html'">Home</li>
        <li class="active">Dashboard</li>
        <li onclick="location.href='expenses.html'">Expenses</li>
    </ul>

    <div style="position:absolute; bottom:30px; left:20px; right:20px; text-align:center;">
        <img src="../images/sidebar.png" width="200" alt="Finance Illustration">
    </div>

</div>

<div class="main fade-in">

    <div class="summary-grid">

        <div class="summary-card">
            <div class="summary-title">Monthly Income</div>
            <div class="summary-value" id="totalIncome">₹0</div>
        </div>

        <div class="summary-card">
            <div class="summary-title">Total Expense</div>
            <div class="summary-value" id="totalExpense">₹0</div>
        </div>

        <div class="summary-card">
            <div class="summary-title">Remaining Balance</div>
            <div class="summary-value" id="remainingBalance">₹0</div>
        </div>

        <div class="summary-card">
            <div class="summary-title">Total Categories</div>
            <div class="summary-value" id="totalCategories">0</div>
        </div>

    </div>

    <div class="card">
        <h3>Add Income</h3>
        <input type="number" id="incomeAmount" placeholder="Enter income amount">
        <input type="date" id="incomeDate">
        <button onclick="addIncome()">Add Income</button>
    </div>

    <div class="card">
        <h3>Expense Breakdown</h3>
        <canvas id="expenseChart"></canvas>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
